<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Privada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #conteudo {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Área Privada</h1>
        <p>Insira a senha para acessar:</p>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="verificarSenha()">Entrar</button>
        
        <div id="conteudo" style="display: none;"></div>
    </div>

    <script>
        function verificarSenha() {
            var senhaDigitada = document.getElementById("senha").value;
            var senhaCorreta = "ADPentest2024Key";
            
            if (senhaDigitada === senhaCorreta) {
                // Senha correta, exibir conteúdo simulado
                document.getElementById("conteudo").style.display = "block";
                document.getElementById("conteudo").innerHTML = "<h2>Conteúdo de emails.txt:</h2><p>Aqui está o conteúdo confidencial simulado...</p>";
            } else {
                // Senha incorreta
                alert("Senha incorreta. Tente novamente.");
            }
        }
    </script>
</body>
</html>
