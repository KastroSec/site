<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página em Manutenção</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #111111;
    color: #ffffff;
    text-align: center;
    padding: 50px;
    margin: 0;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.2rem;
    margin-bottom: 30px;
  }

  .whatsapp-button {
    background-color: #25d366;
    color: #ffffff;
    border: none;
    padding: 15px 30px;
    font-size: 1.2rem;
    text-decoration: none;
    border-radius: 5px;
    transition: background-color 0.3s ease;
    display: inline-block;
    margin-top: 20px;
  }

  .whatsapp-button:hover {
    background-color: #128c7e;
  }

  .logo {
    max-width: 100%;
    height: auto;
    margin-bottom: 40px;
  }
</style>
</head>
<body>

<div class="container">
  <img src="https://raw.githubusercontent.com/KastroSec/site/main/assets/image/gico.png" alt="Logo da Empresa" class="logo">
  <h1>Estamos em Manutenção</h1>
  <p>Voltaremos em breve com melhorias em nossa plataforma.</p>
  <a href="https://wa.me/5516993655297" target="_blank" class="whatsapp-button">Contato pelo WhatsApp</a>
</div>

</body>
</html>
